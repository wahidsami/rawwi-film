server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  autoindex off;

  # Security headers (applied to all responses).
  # Note: script-src includes 'unsafe-eval' for some Vite/React dev-style bundles; remove only after verifying prod build.
  add_header X-Frame-Options "DENY" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; worker-src 'self' blob:; img-src 'self' data: blob: https:; font-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; connect-src 'self' data: https: wss:;" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Never serve sensitive probe targets from SPA fallback.
  location ~* ^/(?:\.env(?:\..*)?|\.git(?:/.*)?|\.htaccess|config\.json|composer\.(?:json|lock)|package(?:-lock)?\.json|yarn\.lock|pnpm-lock\.yaml)$ {
    access_log off;
    return 404;
  }

  # Block hidden dotfiles/folders except ACME challenge path.
  location ~ /\.(?!well-known).* {
    access_log off;
    return 404;
  }

  # Hashed static assets: cache long-term.
  location ^~ /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # Fonts/images used in PDF generation and login pages.
  location ~* \.(?:png|jpg|jpeg|webp|gif|svg|ico|ttf|otf|woff|woff2)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
  }

  # App shell must be revalidated so new deployments pick latest JS hash.
  location = /index.html {
    try_files $uri =404;
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
