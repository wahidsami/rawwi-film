server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  autoindex off;

  # Security headers at server level (inherited by locations that do NOT use add_header).
  # Note: script-src includes 'unsafe-eval' for some Vite/React dev-style bundles; remove only after verifying prod build.
  include /etc/nginx/conf.d/security-headers.conf;

  # Never serve sensitive probe targets from SPA fallback.
  location ~* ^/(?:\.env(?:\..*)?|\.git(?:/.*)?|\.htaccess|config\.json|composer\.(?:json|lock)|package(?:-lock)?\.json|yarn\.lock|pnpm-lock\.yaml)$ {
    access_log off;
    return 404;
  }

  # Block hidden dotfiles/folders except ACME challenge path.
  location ~ /\.(?!well-known).* {
    access_log off;
    return 404;
  }

  # Vite emits pdf.worker-*.mjs; stock mime.types often map .mjs → application/octet-stream,
  # which breaks ES module workers (browser requires application/javascript).
  location ~* ^/assets/.+\.mjs$ {
    default_type application/javascript;
    charset utf-8;
    try_files $uri =404;
    expires 1y;
    include /etc/nginx/conf.d/security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # Hashed static assets: cache long-term (no ^~ so .mjs above wins via regex first).
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    include /etc/nginx/conf.d/security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # Fonts/images used in PDF generation and login pages.
  location ~* \.(?:png|jpg|jpeg|webp|gif|svg|ico|ttf|otf|woff|woff2)$ {
    try_files $uri =404;
    expires 30d;
    include /etc/nginx/conf.d/security-headers.conf;
    add_header Cache-Control "public, max-age=2592000" always;
  }

  # App shell must be revalidated so new deployments pick latest JS hash.
  # SPA shell: internal redirect lands here — must repeat security headers (nginx drops parent add_header
  # when this block has its own add_header).
  location = /index.html {
    try_files $uri =404;
    expires -1;
    include /etc/nginx/conf.d/security-headers.conf;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
